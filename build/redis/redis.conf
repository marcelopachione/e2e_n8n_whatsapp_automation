# ── Persistence ───────────────────────────────────────────────────────────────
# Save a snapshot every 900s if at least 1 key changed, 300s/10 keys, 60s/10000 keys
save 900 1
save 300 10
save 60 10000

# AOF (Append-Only File) for maximum durability
appendonly yes
appendfsync everysec

# Data directory (mapped via Docker volume)
dir /data

# ── Memory ────────────────────────────────────────────────────────────────────
maxmemory 256mb
maxmemory-policy allkeys-lru

# ── Security ──────────────────────────────────────────────────────────────────
# Disable dangerous commands
rename-command FLUSHALL ""
rename-command FLUSHDB  ""
rename-command DEBUG    ""
rename-command CONFIG   ""

# ── Network ───────────────────────────────────────────────────────────────────
# Listen on all interfaces within the Docker internal network
bind 0.0.0.0
protected-mode no

# ── Logging ───────────────────────────────────────────────────────────────────
loglevel notice
